<!DOCTYPE html>
<html lang="en">

<head>
    <title>Task Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 20px 25px 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 6px;
        }

        h1 {
            margin-top: 0;
            text-align: center;
        }

        form {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            grid-gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.9rem;
            display: block;
            margin-bottom: 4px;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 6px 8px;
            box-sizing: border-box;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }

        button {
            padding: 8px 14px;
            border: none;
            background: #0078d4;
            color: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        button:hover {
            background: #005fa3;
        }

        #taskmanager {
            margin-top: 10px;
        }

        .task-card {
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px 12px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .task-meta {
            font-size: 0.85rem;
            color: #555;
        }

        .task-actions {
            margin-top: 6px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .task-actions button {
            font-size: 0.8rem;
            padding: 6px 10px;
        }

        .task-important {
            border-color: red;
        }

        .task-important .task-header {
            color: red;
        }

        .task-completed .task-header span,
        .task-completed .task-meta {
            text-decoration: line-through;
            color: #777;
        }

        @media (max-width: 600px) {
            form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Task Manager</h1>

        <form id="taskForm">
            <div>
                <label for="taskName">Task Name</label>
                <input type="text" id="taskName" placeholder="Enter task name/description">
            </div>

            <div>
                <label for="priority">Priority</label>
                <select id="priority">
                    <option value="High">High</option>
                    <!--Set default priority to Medium-->
                    <option value="Medium" selected>Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>

            <div>
                <label>Options</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="important">
                    <label for="important">Important</label>
                </div>
            </div>

            <div>
                <label>&nbsp;</label>
                <button type="submit">Add Task</button>
            </div>
        </form>

        <div id="taskmanager"></div>
    </div>

    <script src="FinalProject.js" defer></script>
</body>

</html>
